<html>
  <head>
    <meta name="readthedocs-project-slug" content="project" />
    <meta name="readthedocs-resolver-filename" content="/" />
  </head>
  <body>
    <script type="module">
      import { expect, elementUpdated } from "@open-wc/testing";
      import { runTests } from "@web/test-runner-mocha";
      import * as flyout from "../src/flyout";
      import { defaultStyleSheet } from "../src/defaults.js";

      let config;
      let metaResolverFilename;

      runTests(async () => {
        beforeEach(() => {
          metaResolverFilename = document.querySelector(
            "meta[name='readthedocs-resolver-filename']",
          );
          metaResolverFilename.content = "/";

          config = {
            addons: {
              search: {
                enabled: true,
              },
              flyout: {
                enabled: true,
              },
            },
            readthedocs: {
              resolver: {
                filename: "/",
              },
            },
            projects: {
              current: {
                slug: "project",
                versioning_scheme: "multiple_versions_with_translations",
                language: {
                  code: "en",
                },
                urls: {
                  documentation: "https://project.readthedocs.io/en/latest/",
                  home: "https://readthedocs.org/projects/project/",
                  builds: "https://readthedocs.org/projects/project/builds/",
                  downloads:
                    "https://readthedocs.org/projects/project/downloads/",
                },
              },
              translations: [
                {
                  slug: "project-es",
                  versioning_scheme: "multiple_versions_with_translations",
                  language: {
                    code: "es",
                  },
                  urls: {
                    documentation: "https://project.readthedocs.io/es/latest/",
                    home: "https://readthedocs.org/projects/project/",
                    builds: "https://readthedocs.org/projects/project/builds/",
                    downloads:
                      "https://readthedocs.org/projects/project/downloads/",
                  },
                },
              ],
            },
            versions: {
              active: [
                {
                  slug: "stable",
                  urls: {
                    documentation: "https://project.readthedocs.io/en/stable/",
                  },
                },
                {
                  slug: "latest",
                  urls: {
                    documentation: "https://project.readthedocs.io/en/latest/",
                  },
                },
                {
                  slug: "v1.0",
                  urls: {
                    documentation: "https://project.readthedocs.io/en/v1.0/",
                  },
                },
              ],
              current: {
                slug: "latest",
                downloads: {
                  pdf: "https://project.readthedocs.io/_/downloads/en/latest/pdf/",
                },
              },
            },
          };
        });

        describe("Flyout addon", () => {
          it("render versions panel", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            // Open the versions panel
            element.activePanel = "versions";
            element.opened = true;
            await elementUpdated(element);

            const panel = element.shadowRoot.querySelector(
              "main .panel.versions-panel",
            );
            expect(panel).to.exist;

            const items = panel.querySelectorAll("ul li");
            expect(items.length).to.equal(3);

            // Check current version is highlighted
            const currentItem = panel.querySelector("li.current a");
            expect(currentItem).to.exist;
            expect(currentItem.textContent.trim()).to.equal("latest");

            // Check version links
            const links = panel.querySelectorAll("ul li a");
            expect(links[0].textContent.trim()).to.equal("stable");
            expect(links[0].href).to.include("/en/stable/");
            expect(links[1].textContent.trim()).to.equal("latest");
            expect(links[2].textContent.trim()).to.equal("v1.0");
          });

          it("render languages panel", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            element.activePanel = "languages";
            element.opened = true;
            await elementUpdated(element);

            const panel = element.shadowRoot.querySelector(
              "main .panel.languages-panel",
            );
            expect(panel).to.exist;

            const items = panel.querySelectorAll("ul li");
            expect(items.length).to.equal(2);

            // Current language is highlighted
            const currentItem = panel.querySelector("li.current a");
            expect(currentItem).to.exist;
            expect(currentItem.textContent.trim()).to.equal("en");
          });

          it("render languages panel with translation selected", async () => {
            // Select one of the translations as current project
            let currentProject = config.projects.current;
            let translationProject = config.projects.translations[0];
            config.projects.translations[0] = currentProject;
            config.projects.current = translationProject;

            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            element.activePanel = "languages";
            element.opened = true;
            await elementUpdated(element);

            const panel = element.shadowRoot.querySelector(
              "main .panel.languages-panel",
            );
            expect(panel).to.exist;

            const currentItem = panel.querySelector("li.current a");
            expect(currentItem).to.exist;
            expect(currentItem.textContent.trim()).to.equal("es");
          });

          it("render downloads panel", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            element.activePanel = "downloads";
            element.opened = true;
            await elementUpdated(element);

            const panel = element.shadowRoot.querySelector(
              "main .panel.downloads-panel",
            );
            expect(panel).to.exist;

            const links = panel.querySelectorAll("ul li a");
            expect(links.length).to.equal(1);
            expect(links[0].textContent.trim()).to.equal("PDF");
            expect(links[0].href).to.include("/_/downloads/en/latest/pdf/");
          });

          it("render header with icon buttons", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);

            const nav = element.shadowRoot.querySelector(
              "header nav.panel-icons",
            );
            expect(nav).to.exist;

            // Search icon should be present (search.enabled = true)
            const searchBtn = nav.querySelector('button[title="Search"]');
            expect(searchBtn).to.exist;

            // Downloads icon should be present (has downloads)
            const downloadsBtn = nav.querySelector('button[title="Downloads"]');
            expect(downloadsBtn).to.exist;

            // Version button with label
            const versionBtn = nav.querySelector(
              'button[title="Switch version"]',
            );
            expect(versionBtn).to.exist;
            expect(
              versionBtn.querySelector(".label").textContent.trim(),
            ).to.equal("latest");

            // Language button with label
            const langBtn = nav.querySelector(
              'button[title="Switch language"]',
            );
            expect(langBtn).to.exist;
            expect(langBtn.querySelector(".label").textContent.trim()).to.equal(
              "en",
            );
          });

          it("render footer with branding", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            element.activePanel = "versions";
            element.opened = true;
            await elementUpdated(element);

            const footer = element.shadowRoot.querySelector("main footer");
            expect(footer).to.exist;

            const link = footer.querySelector("a");
            expect(link).to.exist;
            expect(link.href).to.include("about.readthedocs.com");

            const img = footer.querySelector("a img");
            expect(img).to.exist;
            expect(img.alt).to.equal("Read the Docs");
          });

          it("panel is closed by default", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);

            const main = element.shadowRoot.querySelector("main");
            expect(main.classList.contains("closed")).to.be.true;
          });

          it("search disabled hides search icon", async () => {
            config.addons.search.enabled = false;

            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);

            const searchBtn = element.shadowRoot.querySelector(
              'button[title="Search"]',
            );
            expect(searchBtn).to.not.exist;
          });

          it("flyout with readthedocs.resolver.filename being null", async () => {
            metaResolverFilename.content = "/guides/tests.html";

            config.readthedocs.resolver.filename = null;

            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            element.activePanel = "versions";
            element.opened = true;
            await elementUpdated(element);

            const versionLink = element.shadowRoot.querySelector(
              ".versions-panel ul li a",
            );
            expect(versionLink).dom.to.equal(
              '<a href="https://project.readthedocs.io/en/stable/guides/tests.html">stable</a>',
            );
          });

          it("flyout with readthedocs.resolver.filename and different meta.content", async () => {
            metaResolverFilename.content = "/guides/tests.html";

            config.readthedocs.resolver.filename =
              "/examples/single-page-application.html";

            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            element.activePanel = "versions";
            element.opened = true;
            await elementUpdated(element);

            const versionLink = element.shadowRoot.querySelector(
              ".versions-panel ul li a",
            );
            expect(versionLink).dom.to.equal(
              '<a href="https://project.readthedocs.io/en/stable/examples/single-page-application.html">stable</a>',
            );
          });

          // Snapshot tests - these will auto-regenerate on first run
          it("snapshot flyout completely", async () => {
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);
            await expect(element).shadowDom.to.equalSnapshot();
          });

          it("snapshot flyout with search disabled", async () => {
            config.addons.search.enabled = false;

            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);
            await expect(element).shadowDom.to.equalSnapshot();
          });
        });

        describe("Flyout element styling", () => {
          it("supports font size customization with fallback", async () => {
            document.adoptedStyleSheets = [defaultStyleSheet];
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);

            // Addon default of 80% of global --readthedocs-font-size, default 16px
            expect(
              getComputedStyle(element.shadowRoot.querySelector(":host > div"))
                .fontSize,
            ).to.equal("12.8px");
            // Customization of global font size, still using 80% of global font size
            document.documentElement.style.setProperty(
              "--readthedocs-font-size",
              "11px",
            );
            expect(document.documentElement.style.cssText).to.equal(
              "--readthedocs-font-size: 11px;",
            );
            expect(
              getComputedStyle(element.shadowRoot.querySelector(":host > div"))
                .fontSize,
            ).to.equal("8.8px");
            // Customization of flyout font size, overrides 80% of global font size
            document.documentElement.style.setProperty(
              "--readthedocs-flyout-font-size",
              "17px",
            );
            expect(document.documentElement.style.cssText).to.equal(
              "--readthedocs-font-size: 11px; --readthedocs-flyout-font-size: 17px;",
            );
            expect(
              getComputedStyle(element.shadowRoot.querySelector(":host > div"))
                .fontSize,
            ).to.equal("17px");
          });

          it("supports color customization with fallback", async () => {
            // Addons initialization was skipped, load default stylesheet manually
            document.adoptedStyleSheets = [defaultStyleSheet];
            const addon = new flyout.FlyoutAddon(config);
            const element = document.querySelector("readthedocs-flyout");
            await elementUpdated(element);

            // Default
            expect(
              getComputedStyle(element.shadowRoot.querySelector(":host > div"))
                .backgroundColor,
            ).to.equal("rgb(39, 39, 37)");
            // With customization
            document.documentElement.style.setProperty(
              "--readthedocs-flyout-background-color",
              "red",
            );
            expect(
              getComputedStyle(element.shadowRoot.querySelector(":host > div"))
                .backgroundColor,
            ).to.equal("rgb(255, 0, 0)");
          });
        });
      });
    </script>
  </body>
</html>
